<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <clipPath id="leftClip180">
      <polygon points="0,0 180,0 0,180"/>
    </clipPath>
    <clipPath id="rightClip180">
      <polygon points="180,0 180,180 0,180"/>
    </clipPath>
  </defs>
  <!-- Blue H (top-left triangle) -->
  <g clip-path="url(#leftClip180)">
    <rect width="180" height="180" fill="#0076c0"/>
    <path d="M30,20 L30,160 L60,160 L60,100 L120,100 L120,160 L150,160 L150,20 L120,20 L120,80 L60,80 L60,20 Z" fill="white"/>
  </g>
  <!-- Red H (bottom-right triangle) -->
  <g clip-path="url(#rightClip180)">
    <rect width="180" height="180" fill="#ee3425"/>
    <path d="M30,20 L30,160 L60,160 L60,100 L120,100 L120,160 L150,160 L150,20 L120,20 L120,80 L60,80 L60,20 Z" fill="white"/>
  </g>
</svg>
